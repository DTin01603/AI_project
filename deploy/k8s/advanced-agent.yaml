apiVersion: apps/v1
kind: Deployment
metadata:
  name: ai-redis
  labels:
    app: ai-redis
spec:
  replicas: 1
  selector:
    matchLabels:
      app: ai-redis
  template:
    metadata:
      labels:
        app: ai-redis
    spec:
      containers:
        - name: redis
          image: redis:7-alpine
          ports:
            - containerPort: 6379
          readinessProbe:
            tcpSocket:
              port: 6379
            initialDelaySeconds: 3
            periodSeconds: 5
---
apiVersion: v1
kind: Service
metadata:
  name: ai-redis
spec:
  selector:
    app: ai-redis
  ports:
    - port: 6379
      targetPort: 6379
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: ai-backend
  labels:
    app: ai-backend
spec:
  replicas: 2
  selector:
    matchLabels:
      app: ai-backend
  template:
    metadata:
      labels:
        app: ai-backend
    spec:
      containers:
        - name: backend
          image: ai-backend:latest
          imagePullPolicy: IfNotPresent
          ports:
            - containerPort: 8000
          env:
            - name: ADVANCED_AGENT_ENABLED
              value: "true"
            - name: ADVANCED_REDIS_ENABLED
              value: "true"
            - name: ADVANCED_REDIS_URL
              value: redis://ai-redis:6379/0
            - name: ADVANCED_MONITORING_ENABLED
              value: "true"
            - name: ADVANCED_ALERTS_ENABLED
              value: "true"
          readinessProbe:
            httpGet:
              path: /ready
              port: 8000
            initialDelaySeconds: 5
            periodSeconds: 10
          livenessProbe:
            httpGet:
              path: /health
              port: 8000
            initialDelaySeconds: 10
            periodSeconds: 15
---
apiVersion: v1
kind: Service
metadata:
  name: ai-backend
spec:
  selector:
    app: ai-backend
  ports:
    - port: 8000
      targetPort: 8000
---
apiVersion: autoscaling/v2
kind: HorizontalPodAutoscaler
metadata:
  name: ai-backend-hpa
spec:
  scaleTargetRef:
    apiVersion: apps/v1
    kind: Deployment
    name: ai-backend
  minReplicas: 2
  maxReplicas: 8
  metrics:
    - type: Resource
      resource:
        name: cpu
        target:
          type: Utilization
          averageUtilization: 70
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: ai-frontend
  labels:
    app: ai-frontend
spec:
  replicas: 1
  selector:
    matchLabels:
      app: ai-frontend
  template:
    metadata:
      labels:
        app: ai-frontend
    spec:
      containers:
        - name: frontend
          image: ai-frontend:latest
          imagePullPolicy: IfNotPresent
          ports:
            - containerPort: 5173
          env:
            - name: VITE_PROXY_TARGET
              value: http://ai-backend:8000
---
apiVersion: v1
kind: Service
metadata:
  name: ai-frontend
spec:
  selector:
    app: ai-frontend
  ports:
    - port: 5173
      targetPort: 5173
