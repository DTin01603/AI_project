services:
  backend:
    build:
      context: .
      dockerfile: Dockerfile.backend
    container_name: ai-backend
    env_file:
      - .env
    ports:
      - "8000:8000"

  frontend:
    build:
      context: .
      dockerfile: Dockerfile.frontend
    container_name: ai-frontend
    ports:
      - "5173:5173"
    environment:
      VITE_PROXY_TARGET: http://backend:8000
    depends_on:
      - backend