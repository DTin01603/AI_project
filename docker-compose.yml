services:
  backend:
    build:
      context: .
      dockerfile: Dockerfile.backend
    container_name: ai-backend
    env_file:
      - .env
    environment:
      GEMINI_API_KEY: ${GEMINI_API_KEY:-}
      GOOGLE_API_KEY: ${GOOGLE_API_KEY:-}
      GROQ_API_KEY: ${GROQ_API_KEY:-}
      GOOGLE_SEARCH_API_KEY: ${GOOGLE_SEARCH_API_KEY:-}
      GOOGLE_SEARCH_ENGINE_ID: ${GOOGLE_SEARCH_ENGINE_ID:-}
      TAVILY_API_KEY: ${TAVILY_API_KEY:-}
      RESEARCH_AGENT_ENABLED: ${RESEARCH_AGENT_ENABLED:-true}
      LANGGRAPH_CHECKPOINTER: ${LANGGRAPH_CHECKPOINTER:-sqlite}
      LANGGRAPH_DB_PATH: ${LANGGRAPH_DB_PATH:-./checkpoints.db}
      POSTGRES_CONNECTION_STRING: ${POSTGRES_CONNECTION_STRING:-}
      DEFAULT_MODEL: ${DEFAULT_MODEL:-gemini/gemini-2.5-flash-lite}
      DEFAULT_MAX_OUTPUT_TOKENS: ${DEFAULT_MAX_OUTPUT_TOKENS:-1200}
      DATABASE_PATH: ${DATABASE_PATH:-./data/conversations.db}
      ANALYSIS_TIMEOUT_SECONDS: ${ANALYSIS_TIMEOUT_SECONDS:-2}
      LLM_TIMEOUT_SECONDS: ${LLM_TIMEOUT_SECONDS:-10}
      PLANNING_TIMEOUT_SECONDS: ${PLANNING_TIMEOUT_SECONDS:-5}
      RESEARCH_TIMEOUT_SECONDS: ${RESEARCH_TIMEOUT_SECONDS:-10}
      AGGREGATOR_TIMEOUT_SECONDS: ${AGGREGATOR_TIMEOUT_SECONDS:-3}
      RESPONSE_TIMEOUT_SECONDS: ${RESPONSE_TIMEOUT_SECONDS:-15}
      MAX_RESEARCH_TASKS: ${MAX_RESEARCH_TASKS:-5}
      MAX_SEARCH_RESULTS: ${MAX_SEARCH_RESULTS:-3}
      LOG_LEVEL: ${LOG_LEVEL:-INFO}
    ports:
      - "8000:8000"
    volumes:
      - ./data:/app/data

  frontend:
    build:
      context: .
      dockerfile: Dockerfile.frontend
    container_name: ai-frontend
    ports:
      - "5173:5173"
    environment:
      VITE_PROXY_TARGET: ${VITE_PROXY_TARGET:-http://backend:8000}
    depends_on:
      - backend